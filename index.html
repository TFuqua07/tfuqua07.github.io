<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula's Achievements</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-card: #1e1e2e;
            --text-primary: #f0f0f5;
            --text-secondary: #9090a0;
            --text-muted: #606070;
            --border: #2a2a3a;
            --accent: #6366f1;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            overflow-x: hidden;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
        }

        h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }

        .tab-nav {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tab-nav::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 1rem 1.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.15s;
            white-space: nowrap;
            font-family: inherit;
        }
        .tab-btn:hover { color: var(--text-primary); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .tiers-container {
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 1.5rem;
            gap: 1rem;
            min-height: calc(100vh - 130px);
            align-items: flex-start;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .tiers-container::-webkit-scrollbar { height: 6px; }
        .tiers-container::-webkit-scrollbar-track { background: transparent; }
        .tiers-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .tier-column {
            flex: 0 0 360px;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .tier-header {
            padding: 0.6rem 1rem;
            font-weight: 700;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            position: sticky;
            top: 0;
        }

        .tier-count {
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* New card style matching the image - glowing border, gradient bg */
        .achievement-card {
            background: linear-gradient(135deg, rgba(30,30,46,0.9) 0%, rgba(20,20,35,0.95) 100%);
            border: 2px solid;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: row;
            align-items: stretch;
            transition: all 0.2s ease;
            cursor: default;
            min-height: 90px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .achievement-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .card-thumb {
            flex: 0 0 160px;
            position: relative;
            overflow: hidden;
            background: var(--bg-tertiary);
            aspect-ratio: 16/9;
        }
        .card-thumb img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-thumb .no-thumb {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 0.75rem;
        }
        .card-thumb.has-video { cursor: pointer; }
        .card-thumb.has-video:hover img { opacity: 0.8; }

        .play-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 36px; height: 36px;
            background: rgba(0,0,0,0.8);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: none;
        }
        .card-thumb.has-video:hover .play-icon { opacity: 1; }
        .play-icon svg { width: 14px; height: 14px; fill: white; margin-left: 2px; }

        .card-body {
            flex: 1;
            padding: 0.75rem 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-campaign {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 0.15rem;
        }

        .card-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.5rem;
            gap: 0.5rem;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .meta-icon { display: flex; align-items: center; color: var(--text-muted); }
        .meta-icon svg { width: 12px; height: 12px; }

        .meta-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .card-rating {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            flex-shrink: 0;
        }

        .rating-heart { color: #9090a0; }
        .rating-heart svg { width: 14px; height: 14px; fill: currentColor; display: block; }

        .rating-value {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            padding: 0.15rem 0.5rem;
        }

        .empty-state {
            text-align: center; padding: 4rem 2rem;
            color: var(--text-muted); font-size: 0.9375rem;
            width: 100%;
        }

<base target="_blank">
</head>
<body>
    <header>
        <h1>Nebula's Achievements</h1>
    </header>

    <nav class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('celeste_goldens', this)">Celeste Goldens</button>
        <button class="tab-btn" onclick="switchTab('celeste_clears', this)">Celeste Clears</button>
        <button class="tab-btn" onclick="switchTab('demons', this)">Demons</button>
        <button class="tab-btn" onclick="switchTab('gd_platformer', this)">GD Platformers</button>
    </nav>

    <main id="content"></main>

    <script>
        const RAW_URL = 'https://raw.githubusercontent.com/TFuqua07/tfuqua07.github.io/main/data/achievements.json';

        let currentData = {};
        let currentTab = 'celeste_goldens';

                // GD tier names - 20 tiers with specific colors
        const gdTierNames = {
            1: 'Beginner', 2: 'Easy', 3: 'Medium', 4: 'Hard', 5: 'Very Hard',
            6: 'Insane', 7: 'Extreme', 8: 'Remorseless', 9: 'Relentless',
            10: 'Terrifying', 11: 'Catastrophic', 12: 'Inexorable',
            13: 'Excruciating', 14: 'Merciless', 15: 'Monstrous',
            16: 'Apocalyptic', 17: 'Demonic', 18: 'Menacing', 19: 'Unreal', 20: 'Nightmare'
        };

        async function loadAchievements() {
            try {
                const response = await fetch(RAW_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('HTTP ' + response.status);
                currentData = await response.json();
                renderTab(currentTab);
            } catch (error) {
                document.getElementById('content').innerHTML =
                    '<div class="empty-state">Failed to load achievements</div>';
            }
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderTab(tab);
        }

        function getYouTubeId(url) {
            if (!url) return null;
            const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
            return match ? match[1] : null;
        }

        function renderTab(category) {
            const container = document.getElementById('content');
            const items = currentData[category] || [];

            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state">No achievements yet</div>';
                return;
            }

            const isClears  = category === 'celeste_clears';
            const isGoldens = category === 'celeste_goldens';
            const isGD      = category === 'demons' || category === 'gd_platformer';

            const grouped = {};
            items.forEach(item => {
                const key = isClears ? `star-${item.star}` : `tier-${item.tier}`;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(item);
            });

            // Sort alphabetically by name within each tier
            Object.keys(grouped).forEach(key => {
                grouped[key].sort((a, b) => a.name.localeCompare(b.name));
            });

            const sortedKeys = Object.keys(grouped).sort((a, b) =>
                parseInt(b.split('-')[1]) - parseInt(a.split('-')[1])
            );

            let html = '<div class="tiers-container">';

            sortedKeys.forEach(key => {
                const group = grouped[key];
                const num = parseInt(key.split('-')[1]);

                let colorClass, label, borderClass;

                if (isClears) {
                    colorClass = `star-color-${num}`;
                    borderClass = `star-border-${num}`;
                    label = `${num}★`;
                } else if (isGoldens) {
                    // Celeste goldens: numbers 1-22, no naming
                    colorClass = `tier-color-${num}`;
                    borderClass = `tier-border-${num}`;
                    label = `Tier ${num}`;
                } else {
                    // GD: names only, 1-19
                    colorClass = `gd-tier-color-${num}`;
                    borderClass = `gd-tier-border-${num}`;
                    label = gdTierNames[num] || `Tier ${num}`;
                }

                html += `<div class="tier-column">`;
                html += `
                    <div class="tier-header ${colorClass}">
                        <span>${label}</span>
                        <span class="tier-count">${group.length}</span>
                    </div>
                `;
                group.forEach(item => { html += renderCard(item, category, borderClass); });
                html += `</div>`;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        function renderCard(item, category, borderClass) {
            const isClears  = category === 'celeste_clears';
            const isGoldens = category === 'celeste_goldens';
            const isGD      = category === 'demons' || category === 'gd_platformer';

            const ytId = getYouTubeId(item.video);
            const thumbnailUrl = item.thumbnail || (ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : null);
            const hasVideo = !!item.video;

            const thumbContent = thumbnailUrl
                ? `<img src="${escapeHtml(thumbnailUrl)}" alt="" loading="lazy">`
                : `<div class="no-thumb">No image</div>`;

            const thumbClick = hasVideo
                ? `onclick="window.open('${escapeHtml(item.video)}','_blank')"` : '';

            const playIcon = hasVideo
                ? `<div class="play-icon"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`
                : '';

            // Time / deaths / attempts
            let metaHtml = '';
            if ((isGoldens || isClears) && item.time) {
                metaHtml = `
                    <span class="meta-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></span>
                    <span class="meta-text">${escapeHtml(item.time)}</span>`;
            } else if (isClears && item.deaths != null) {
                metaHtml = `
                    <span class="meta-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg></span>
                    <span class="meta-text">${item.deaths} deaths</span>`;
            } else if (isGD && item.attempts != null) {
                metaHtml = `
                    <span class="meta-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 6 6 1-4 4 1 6-6-3-6 3 1-6-4-4 6-1z"/></svg></span>
                    <span class="meta-text">${item.attempts.toLocaleString()} attempts</span>`;
            }

            const ratingHtml = item.rating != null ? `
                <div class="card-rating">
                    <span class="rating-heart"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></span>
                    <span class="rating-value">${item.rating}</span>
                </div>` : '';

            return `
                <article class="achievement-card ${borderClass}">
                    <div class="card-thumb ${hasVideo ? 'has-video' : ''}" ${thumbClick}>
                        ${thumbContent}
                        ${playIcon}
                    </div>
                    <div class="card-body">
                        <div>
                            <div class="card-title">${escapeHtml(item.name)}</div>
                            ${item.campaign ? `<div class="card-campaign">${escapeHtml(item.campaign)}</div>` : ''}
                        </div>
                        <div class="card-bottom">
                            <div class="card-meta">${metaHtml}</div>
                            ${ratingHtml}
                        </div>
                    </div>
                </article>`;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadAchievements();
    </script>
</body>
</html>
