<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula's Achievements</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-card: #1e1e2e;
            --text-primary: #f0f0f5;
            --text-secondary: #9090a0;
            --text-muted: #606070;
            --border: #2a2a3a;
            --accent: #6366f1;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            overflow-x: hidden;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
        }

        h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }

        .tab-nav {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tab-nav::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 1rem 1.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.15s;
            white-space: nowrap;
            font-family: inherit;
        }
        .tab-btn:hover { color: var(--text-primary); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* Horizontal tier layout */
        .tiers-container {
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 1.5rem;
            gap: 1rem;
            min-height: calc(100vh - 130px);
            align-items: flex-start;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .tiers-container::-webkit-scrollbar { height: 6px; }
        .tiers-container::-webkit-scrollbar-track { background: transparent; }
        .tiers-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .tier-column {
            flex: 0 0 280px;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .tier-header {
            padding: 0.75rem 1rem;
            font-weight: 700;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            position: sticky;
            top: 0;
        }

        .tier-count {
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* Achievement card */
        .achievement-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: default;
        }
        .achievement-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .card-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--bg-tertiary);
            position: relative;
            overflow: hidden;
        }
        .card-thumbnail img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.2s;
        }
        .card-thumbnail.has-video {
            cursor: pointer;
        }
        .card-thumbnail.has-video:hover img { opacity: 0.75; }
        .card-thumbnail.has-video::after {
            content: '';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            background: rgba(0,0,0,0.3);
        }
        .card-thumbnail.has-video:hover::after { opacity: 1; }

        .play-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 42px; height: 42px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .card-thumbnail.has-video:hover .play-icon { opacity: 1; }
        .play-icon svg { width: 16px; height: 16px; fill: white; margin-left: 2px; }

        .no-thumb {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 0.8rem;
        }

        .card-content { padding: 0.875rem; }
        .card-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.25rem; color: var(--text-primary); line-height: 1.4; }
        .card-campaign { color: var(--text-secondary); font-size: 0.75rem; margin-bottom: 0.625rem; font-weight: 500; }

        .card-stats { display: flex; gap: 0.5rem; flex-wrap: wrap; }

        .stat {
            display: flex; align-items: center; gap: 0.3rem;
            font-size: 0.75rem; color: var(--text-secondary);
            background: var(--bg-tertiary); padding: 0.3rem 0.5rem;
            border-radius: 5px; font-weight: 500;
        }
        .stat svg { width: 12px; height: 12px; }

        .empty-state {
            text-align: center; padding: 4rem 2rem;
            color: var(--text-muted); font-size: 0.9375rem;
            width: 100%;
        }

        /* ── Celeste Golden tier colors (Tier 1–22) ── */
        /* Colors from goldberries.net tier naming but with your exact hex codes */
        .tier-color-22 { background: #1a0f2e; color: #bd60ff; border: 1px solid #bd60ff44; }
        .tier-color-21 { background: #1a0f2e; color: #d863ff; border: 1px solid #d863ff44; }
        .tier-color-20 { background: #1a0f2e; color: #f266ff; border: 1px solid #f266ff44; }
        .tier-color-19 { background: #1f0f1a; color: #ff68d9; border: 1px solid #ff68d944; }
        .tier-color-18 { background: #1f0f1a; color: #ff6daa; border: 1px solid #ff6daa44; }
        .tier-color-17 { background: #1f0f15; color: #ff6d79; border: 1px solid #ff6d7944; }
        .tier-color-16 { background: #1f1010; color: #ff7c70; border: 1px solid #ff7c7044; }
        .tier-color-15 { background: #1f1510; color: #ff9572; border: 1px solid #ff957244; }
        .tier-color-14 { background: #1f1a10; color: #ffae75; border: 1px solid #ffae7544; }
        .tier-color-13 { background: #1f1c10; color: #ffc677; border: 1px solid #ffc67744; }
        .tier-color-12 { background: #1f1e10; color: #ffdd7a; border: 1px solid #ffdd7a44; }
        .tier-color-11 { background: #1e1f10; color: #fff47c; border: 1px solid #fff47c44; }
        .tier-color-10 { background: #1a1f10; color: #f4ff7f; border: 1px solid #f4ff7f44; }
        .tier-color-9  { background: #121f10; color: #d5ff82; border: 1px solid #d5ff8244; }
        .tier-color-8  { background: #101f10; color: #b7ff84; border: 1px solid #b7ff8444; }
        .tier-color-7  { background: #101f10; color: #9bff87; border: 1px solid #9bff8744; }
        .tier-color-6  { background: #101f18; color: #89ffb0; border: 1px solid #89ffb044; }
        .tier-color-5  { background: #101f1f; color: #8cffe2; border: 1px solid #8cffe244; }
        .tier-color-4  { background: #101a1f; color: #8eecff; border: 1px solid #8eecff44; }
        .tier-color-3  { background: #10151f; color: #91c8ff; border: 1px solid #91c8ff44; }
        .tier-color-2  { background: #10121f; color: #93aeff; border: 1px solid #93aeff44; }
        .tier-color-1  { background: #10101f; color: #9696ff; border: 1px solid #9696ff44; }

        /* ── Celeste Clears star colors ── */
        .star-color-9 { background: #0d1020; color: #6496ff; border: 1px solid #6496ff44; }
        .star-color-8 { background: #0d1820; color: #64d4ff; border: 1px solid #64d4ff44; }
        .star-color-7 { background: #0d2018; color: #64ffb4; border: 1px solid #64ffb444; }
        .star-color-6 { background: #0d2010; color: #96ff64; border: 1px solid #96ff6444; }
        .star-color-5 { background: #1c200d; color: #e6ff64; border: 1px solid #e6ff6444; }
        .star-color-4 { background: #20150d; color: #ffb464; border: 1px solid #ffb46444; }
        .star-color-3 { background: #200d0d; color: #ff6464; border: 1px solid #ff646444; }
        .star-color-2 { background: #1a0d20; color: #e664ff; border: 1px solid #e664ff44; }
        .star-color-1 { background: #151520; color: #9696c8; border: 1px solid #9696c844; }

        /* ── GD Demon tier colors (same hex scale as goldens) ── */
        /* GD uses same tier 1-22 scale */

        @media (max-width: 640px) {
            .tiers-container { padding: 1rem; }
            .tier-column { flex: 0 0 240px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Nebula's Achievements</h1>
    </header>

    <nav class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('celeste_goldens', this)">Celeste Goldens</button>
        <button class="tab-btn" onclick="switchTab('celeste_clears', this)">Celeste Clears</button>
        <button class="tab-btn" onclick="switchTab('demons', this)">Demons</button>
        <button class="tab-btn" onclick="switchTab('gd_platformer', this)">GD Platformers</button>
    </nav>

    <main id="content"></main>

    <script>
        const RAW_URL = 'https://raw.githubusercontent.com/TFuqua07/tfuqua07.github.io/main/data/achievements.json';

        let currentData = {};
        let currentTab = 'celeste_goldens';
        let dataLoaded = false;

        const tierNames = {
            1: 'Beginner', 2: 'Easy', 3: 'Medium', 4: 'Hard', 5: 'Very Hard',
            6: 'Insane', 7: 'Extreme', 8: 'Remorseless', 9: 'Relentless',
            10: 'Terrifying', 11: 'Catastrophic', 12: 'Merciless',
            13: 'Excruciating', 14: 'Monstrous', 15: 'Apocalyptic',
            16: 'Demonic', 17: 'Menacing', 18: 'Unreal', 19: 'Nightmare',
            20: 'Extreme Demon', 21: 'Easy Demon', 22: 'Medium Demon'
        };

        // GD-specific tier names (no demon subcategories mixed in)
        const gdTierNames = {
            1: 'Beginner', 2: 'Easy', 3: 'Medium', 4: 'Hard', 5: 'Very Hard',
            6: 'Insane', 7: 'Extreme', 8: 'Remorseless', 9: 'Relentless',
            10: 'Terrifying', 11: 'Catastrophic', 12: 'Merciless',
            13: 'Excruciating', 14: 'Monstrous', 15: 'Apocalyptic',
            16: 'Demonic', 17: 'Menacing', 18: 'Unreal', 19: 'Nightmare',
            20: 'Tier 20', 21: 'Tier 21', 22: 'Tier 22'
        };

        async function loadAchievements() {
            try {
                const response = await fetch(RAW_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('HTTP ' + response.status);
                currentData = await response.json();
                dataLoaded = true;
                renderTab(currentTab);
            } catch (error) {
                document.getElementById('content').innerHTML =
                    '<div class="empty-state">Failed to load achievements</div>';
            }
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderTab(tab);
        }

        function getYouTubeId(url) {
            if (!url) return null;
            const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
            return match ? match[1] : null;
        }

        function formatTime(timeStr) {
            if (!timeStr) return null;
            return timeStr;
        }

        function renderTab(category) {
            const container = document.getElementById('content');
            const items = currentData[category] || [];

            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state">No achievements yet</div>';
                return;
            }

            const isClears = category === 'celeste_clears';
            const isGD = category === 'demons' || category === 'gd_platformer';

            // Group by tier or star
            const grouped = {};
            items.forEach(item => {
                const key = isClears
                    ? `star-${item.star}`
                    : `tier-${item.tier}`;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(item);
            });

            // Sort keys highest → lowest (hardest first)
            const sortedKeys = Object.keys(grouped).sort((a, b) =>
                parseInt(b.split('-')[1]) - parseInt(a.split('-')[1])
            );

            let html = '<div class="tiers-container">';

            sortedKeys.forEach(key => {
                const group = grouped[key];
                const isTier = key.startsWith('tier');
                const num = parseInt(key.split('-')[1]);

                let colorClass, label;
                if (isClears) {
                    colorClass = `star-color-${num}`;
                    label = `${num}★`;
                } else {
                    colorClass = `tier-color-${num}`;
                    label = isGD ? (gdTierNames[num] || `Tier ${num}`) : (tierNames[num] || `Tier ${num}`);
                }

                html += `<div class="tier-column">`;
                html += `
                    <div class="tier-header ${colorClass}">
                        <span>${label}</span>
                        <span class="tier-count">${group.length}</span>
                    </div>
                `;

                group.forEach(item => {
                    html += renderCard(item, category);
                });

                html += `</div>`;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        function renderCard(item, category) {
            const isClears = category === 'celeste_clears';
            const isGoldens = category === 'celeste_goldens';

            let statsHtml = '';
            if (isClears) {
                if (item.deaths !== undefined && item.deaths !== null) {
                    statsHtml += `<div class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg>${item.deaths} deaths</div>`;
                }
                const t = formatTime(item.time);
                if (t) statsHtml += `<div class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${t}</div>`;
            } else if (isGoldens) {
                const t = formatTime(item.time);
                if (t) statsHtml += `<div class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${t}</div>`;
            } else {
                if (item.attempts !== undefined && item.attempts !== null) {
                    statsHtml += `<div class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 6 6 1-4 4 1 6-6-3-6 3 1-6-4-4 6-1z"/></svg>${item.attempts.toLocaleString()} attempts</div>`;
                }
            }

            const ytId = getYouTubeId(item.video);
            const thumbnailUrl = item.thumbnail || (ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : null);
            const hasVideo = !!item.video;

            const thumbHtml = thumbnailUrl
                ? `<img src="${escapeHtml(thumbnailUrl)}" alt="" loading="lazy">`
                : `<div class="no-thumb">No Thumbnail</div>`;

            const thumbClick = hasVideo
                ? `onclick="window.open('${escapeHtml(item.video)}','_blank')"`
                : '';

            const playIcon = hasVideo
                ? `<div class="play-icon"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`
                : '';

            return `
                <article class="achievement-card">
                    <div class="card-thumbnail ${hasVideo ? 'has-video' : ''}" ${thumbClick}>
                        ${thumbHtml}
                        ${playIcon}
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${escapeHtml(item.name)}</h3>
                        ${item.campaign ? `<div class="card-campaign">${escapeHtml(item.campaign)}</div>` : ''}
                        <div class="card-stats">${statsHtml}</div>
                    </div>
                </article>
            `;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadAchievements();
    </script>
</body>
</html>
