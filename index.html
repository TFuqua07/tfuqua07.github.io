<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula's Achievements</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-card: #1e1e2e;
            --text-primary: #f0f0f5;
            --text-secondary: #9090a0;
            --text-muted: #606070;
            --border: #2a2a3a;
            --accent: #6366f1;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            overflow-x: hidden;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
        }

        h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }

        .tab-nav {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tab-nav::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 1rem 1.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.15s;
            white-space: nowrap;
            font-family: inherit;
        }
        .tab-btn:hover { color: var(--text-primary); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* ── Tier/card layout (Celeste / GD) ── */
        .tiers-container {
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 1.5rem;
            gap: 1rem;
            min-height: calc(100vh - 130px);
            align-items: flex-start;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .tiers-container::-webkit-scrollbar { height: 6px; }
        .tiers-container::-webkit-scrollbar-track { background: transparent; }
        .tiers-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .tier-column {
            flex: 0 0 360px;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .tier-header {
            padding: 0.6rem 1rem;
            font-weight: 700;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            position: sticky;
            top: 0;
        }

        .tier-count {
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .achievement-card {
            background: linear-gradient(135deg, rgba(30,30,46,0.9) 0%, rgba(20,20,35,0.95) 100%);
            border: 2px solid;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: row;
            align-items: stretch;
            transition: all 0.2s ease;
            cursor: default;
            min-height: 90px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .achievement-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .card-thumb {
            flex: 0 0 160px;
            position: relative;
            overflow: hidden;
            background: var(--bg-tertiary);
            aspect-ratio: 16/9;
        }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card-thumb .no-thumb {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 0.75rem;
        }
        .card-thumb.has-video { cursor: pointer; }
        .card-thumb.has-video:hover img { opacity: 0.8; }

        .play-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 36px; height: 36px;
            background: rgba(0,0,0,0.8);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 0.15s;
            pointer-events: none;
        }
        .card-thumb.has-video:hover .play-icon { opacity: 1; }
        .play-icon svg { width: 14px; height: 14px; fill: white; margin-left: 2px; }

        .card-body {
            flex: 1;
            padding: 0.75rem 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-campaign {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 0.15rem;
        }

        .card-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.5rem;
            gap: 0.5rem;
        }

        .card-meta { display: flex; align-items: center; gap: 0.35rem; }
        .meta-icon { display: flex; align-items: center; color: var(--text-muted); }
        .meta-icon svg { width: 12px; height: 12px; }
        .meta-text { font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; }

        .card-rating { display: flex; align-items: center; gap: 0.35rem; flex-shrink: 0; }
        .rating-heart { color: #9090a0; }
        .rating-heart svg { width: 14px; height: 14px; fill: currentColor; display: block; }
        .rating-value {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            font-size: 0.8rem; font-weight: 600;
            color: var(--text-primary);
            padding: 0.15rem 0.5rem;
        }

        .empty-state {
            text-align: center; padding: 4rem 2rem;
            color: var(--text-muted); font-size: 0.9375rem;
            width: 100%;
        }

        /* ── Celeste Golden tier colors (Tier 1–22) ── */
        .tier-color-22 { background: #1a0f2e; color: #bd60ff; border-color: #bd60ff44; }
        .tier-color-21 { background: #1a0f2e; color: #d863ff; border-color: #d863ff44; }
        .tier-color-20 { background: #1a0f2e; color: #f266ff; border-color: #f266ff44; }

        .tier-color-10 { background: #1a1f10; color: #f4ff7f; border-color: #f4ff7f44; }
        .tier-color-9  { background: #121f10; color: #d5ff82; border-color: #d5ff8244; }
        .tier-color-8  { background: #101f10; color: #b7ff84; border-color: #b7ff8444; }
        .tier-color-7  { background: #101f10; color: #9bff87; border-color: #9bff8744; }

        .achievement-card.tier-border-21 { border-color: #d863ff66; }
        .achievement-card.tier-border-20 { border-color: #f266ff66; }
        .achievement-card.tier-border-19 { border-color: #ff68d966; }
        .achievement-card.tier-border-18 { border-color: #ff6daa66; }
        .achievement-card.tier-border-17 { border-color: #ff6d7966; }

        .achievement-card.tier-border-11 { border-color: #fff47c66; }
        .achievement-card.tier-border-10 { border-color: #f4ff7f66; }
        .achievement-card.tier-border-9  { border-color: #d5ff8266; }

        .achievement-card.tier-border-7  { border-color: #9bff8766; }

        .achievement-card.tier-border-5  { border-color: #8cffe266; }
        .achievement-card.tier-border-4  { border-color: #8eecff66; }
        .achievement-card.tier-border-3  { border-color: #91c8ff66; }
        .achievement-card.tier-border-2  { border-color: #93aeff66; }
        .achievement-card.tier-border-1  { border-color: #9696ff66; }

        /* ── Hard Clear colors (1-10) ── */
        .star-color-10 { background: #0a0a1a; color: #a29ffe; border-color: #a29ffe44; }
        .star-color-9  { background: #0a0a1a; color: #4058fc; border-color: #4058fc44; }
        .star-color-8  { background: #0a1a1a; color: #32ffff; border-color: #32ffff44; }
        .star-color-7  { background: #0a1a12; color: #32ffa0; border-color: #32ffa044; }
        .star-color-6  { background: #0a1a0a; color: #32ff32; border-color: #32ff3244; }
        .star-color-5  { background: #1a1a0a; color: #ffff32; border-color: #ffff3244; }
        .star-color-4  { background: #1a0f0a; color: #ff5435; border-color: #ff543544; }
        .star-color-3  { background: #1a0a0a; color: #fe496a; border-color: #fe496a44; }
        .star-color-2  { background: #1a0a12; color: #ff39d2; border-color: #ff39d244; }
        .star-color-1  { background: #120a1a; color: #9900ff; border-color: #9900ff44; }

        .achievement-card.star-border-10 { border-color: #a29ffe66; }
        .achievement-card.star-border-9  { border-color: #4058fc66; }
        .achievement-card.star-border-8  { border-color: #32ffff66; }
        .achievement-card.star-border-7  { border-color: #32ffa066; }
        .achievement-card.star-border-6  { border-color: #32ff3266; }
        .achievement-card.star-border-5  { border-color: #ffff3266; }
        .achievement-card.star-border-4  { border-color: #ff543566; }
        .achievement-card.star-border-3  { border-color: #fe496a66; }
        .achievement-card.star-border-2  { border-color: #ff39d266; }
        .achievement-card.star-border-1  { border-color: #9900ff66; }

        /* ── GD tier colors — 20 tiers ── */
        .gd-tier-color-20 { background: #1a0a0a; color: #832828; border-color: #83282844; }
        .gd-tier-color-19 { background: #1a0a10; color: #913869; border-color: #91386944; }
        .gd-tier-color-18 { background: #1a0a15; color: #9452a2; border-color: #9452a244; }

        .gd-tier-color-13 { background: #1f1a10; color: #ffe599; border-color: #ffe59944; }
        .gd-tier-color-12 { background: #1f1810; color: #e7b88d; border-color: #e7b88d44; }
        .gd-tier-color-11 { background: #1f1012; color: #d4666e; border-color: #d4666e44; }
        .gd-tier-color-10 { background: #1a0f1a; color: #da99ea; border-color: #da99ea44; }

        .gd-tier-color-7  { background: #1f0a1f; color: #ff00ff; border-color: #ff00ff44; }
        .gd-tier-color-6  { background: #1f0a0a; color: #ff0000; border-color: #ff000044; }
        .gd-tier-color-5  { background: #1f120a; color: #ff9900; border-color: #ff990044; }
        .gd-tier-color-4  { background: #1f1f0a; color: #ffff00; border-color: #ffff0044; }
        .gd-tier-color-3  { background: #0a1f0a; color: #01ff00; border-color: #01ff0044; }
        .gd-tier-color-2  { background: #0a1f1f; color: #01ffff; border-color: #01ffff44; }
        .gd-tier-color-1  { background: #0a0f1f; color: #4a86e8; border-color: #4a86e844; }

        .achievement-card.gd-tier-border-20 { border-color: #83282866; }
        .achievement-card.gd-tier-border-19 { border-color: #91386966; }
        .achievement-card.gd-tier-border-18 { border-color: #9452a266; }
        .achievement-card.gd-tier-border-17 { border-color: #6d6ab066; }
        .achievement-card.gd-tier-border-16 { border-color: #528cb166; }
        .achievement-card.gd-tier-border-15 { border-color: #5bad9666; }

        /* ── Neon White layout ── */
        .nw-container { padding: 1.5rem 2rem; max-width: 1400px; }

        .nw-selectors {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .nw-select-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex: 1;
            min-width: 200px;
        }

        .nw-select-group label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }

        .nw-select-group select {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.625rem 0.875rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-family: inherit;
            cursor: pointer;
            transition: border-color 0.15s;
            width: 100%;
        }
        .nw-select-group select:focus { outline: none; border-color: var(--accent); }
        .nw-select-group select option { background: var(--bg-secondary); }

        .nw-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        .nw-stage-card {
            background: linear-gradient(135deg, rgba(30,30,46,0.95) 0%, rgba(18,18,26,0.98) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.15s, border-color 0.15s;
        }
        .nw-stage-card:hover { transform: translateY(-2px); border-color: #3a3a5a; }

        .stage-header {
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .stage-name { font-size: 0.95rem; font-weight: 600; color: var(--text-primary); }
        .stage-mission { font-size: 0.7rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }

        .medal-badge {
            display: flex; align-items: center; gap: 0.35rem;
            padding: 0.25rem 0.6rem;
            border-radius: 20px; font-size: 0.75rem; font-weight: 700; border: 1px solid;
        }

        .medal-none    { background: rgba(60,60,80,0.4);  color: #555570; border-color: #2a2a3a; }
        .medal-ace     { background: rgba(255,230,80,0.12); color: #ffe040; border-color: #ffe04044; }
        .medal-red     { background: rgba(255,50,50,0.12);  color: #ff5252; border-color: #ff525244; }
        .medal-emerald { background: rgba(0,200,100,0.12);  color: #00e676; border-color: #00e67644; }
        .medal-amethyst{ background: rgba(180,80,255,0.12); color: #ce93ff; border-color: #ce93ff44; }
        .medal-sapphire{ background: rgba(0,150,255,0.12);  color: #40c4ff; border-color: #40c4ff44; }
        .medal-topaz   { background: rgba(255,165,0,0.12);  color: #ffb300; border-color: #ffb30044; }
        .medal-diamond { background: rgba(100,240,255,0.13);color: #7fffff; border-color: #7fffff55; }

        .stage-body { padding: 0.75rem 1rem; }

        .time-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.25rem;
            margin-bottom: 0.6rem;
        }

        .time-cell {
            display: flex; flex-direction: column; align-items: center;
            gap: 0.15rem; padding: 0.3rem 0.1rem;
            border-radius: 6px; transition: background 0.1s;
        }
        .time-cell.active-medal { background: rgba(255,255,255,0.05); }

        .time-cell-label { font-size: 0.55rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
        .time-cell-val   { font-size: 0.68rem; font-weight: 600; font-variant-numeric: tabular-nums; }

        .tc-ace      .time-cell-label, .tc-ace      .time-cell-val { color: #ffe040; }
        .tc-red      .time-cell-label, .tc-red      .time-cell-val { color: #ff5252; }
        .tc-emerald  .time-cell-label, .tc-emerald  .time-cell-val { color: #00e676; }
        .tc-amethyst .time-cell-label, .tc-amethyst .time-cell-val { color: #ce93ff; }
        .tc-sapphire .time-cell-label, .tc-sapphire .time-cell-val { color: #40c4ff; }
        .tc-topaz    .time-cell-label, .tc-topaz    .time-cell-val { color: #ffb300; }
        .tc-diamond  .time-cell-label, .tc-diamond  .time-cell-val { color: #7fffff; }

        .time-cell.unachieved .time-cell-label,
        .time-cell.unachieved .time-cell-val { color: var(--text-muted); }

        .stage-pb-row {
            display: flex; align-items: center; justify-content: space-between;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .pb-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; }
        .pb-value { font-size: 0.85rem; font-weight: 700; font-variant-numeric: tabular-nums; }
        .pb-none  { color: var(--text-muted); font-style: italic; font-weight: 400; font-size: 0.8rem; }

        .pb-video-link {
            color: var(--accent); font-size: 0.75rem; font-weight: 500;
            text-decoration: none; display: flex; align-items: center; gap: 0.3rem;
        }
        .pb-video-link:hover { color: #818cf8; }

        @media (max-width: 640px) {
            .nw-container { padding: 1rem; }
            .tiers-container { padding: 1rem; }
            .tier-column { flex: 0 0 320px; }
            .card-thumb { flex: 0 0 140px; }
            .time-row { gap: 0.15rem; }
            .time-cell-val { font-size: 0.6rem; }
        }
    </style>

:04.299", "sapphire": "00:04.599", "amethyst": "00:05.299", "emerald": "00:07.899", "red": "00:17.450", "ace": "00:23.000"}, {"stage": "Glide", "diamond": "00:06.899", "topaz": "00:07.299", "sapphire": "00:07.777", "amethyst": "00:08.699", "emerald": "00:09.899", "red": "00:23.319", "ace": "00:31.000"}, {"stage": "Closer", "diamond": "00:09.599", "topaz": "00:09.799", "sapphire": "00:10.099", "amethyst": "00:10.899", "emerald": "00:12.399", "red": "00:34.150", "ace": "00:38.000"}, {"stage": "Hike", "diamond": "00:05.499", "topaz": "00:05.749", "sapphire": "00:06.249", "amethyst": "00:07.099", "emerald": "00:08.099", "red": "00:22.489", "ace": "00:36.500"}, {"stage": "Switch", "diamond": "00:09.549", "topaz": "00:09.899", "sapphire": "00:10.499", "amethyst": "00:11.889", "emerald": "00:12.899", "red": "00:32.430", "ace": "00:43.000"}, {"stage": "Access", "diamond": "00:11.699", "topaz": "00:12.099", "sapphire": "00:13.199", "amethyst": "00:14.799", "emerald": "00:16.499", "red": "00:23.850", "ace": "00:35.500"}, {"stage": "Congregation", "diamond": "00:19.899", "topaz": "00:20.299", "sapphire": "00:20.899", "amethyst": "00:22.899", "emerald": "00:24.899", "red": "00:33.240", "ace": "00:47.500"}, {"stage": "Sequence", "diamond": "00:07.999", "topaz": "00:08.499", "sapphire": "00:09.099", "amethyst": "00:09.849", "emerald": "00:10.999", "red": "00:14.319", "ace": "00:25.000"}, {"stage": "Marathon", "diamond": "00:09.999", "topaz": "00:10.799", "sapphire": "00:11.799", "amethyst": "00:12.999", "emerald": "00:15.299", "red": "01:31.330", "ace": "01:59.980"}], "Hand of God": [{"stage": "Sacrifice", "diamond": "00:15.999", "topaz": "00:16.349", "sapphire": "00:16.859", "amethyst": "00:18.999", "emerald": "00:19.599", "red": "01:28.680", "ace": "01:39.000"}, {"stage": "Absolution", "diamond": "01:06.499", "topaz": "01:09.999", "sapphire": "01:13.999", "amethyst": "01:18.999", "emerald": "01:25.999", "red": "01:47.629", "ace": "02:45.000"}]};

    const MEDAL_ORDER  = ['diamond','topaz','sapphire','amethyst','emerald','red','ace'];
    const MEDAL_LABELS = { diamond:'DMD', topaz:'TPZ', sapphire:'SPH', amethyst:'AME', emerald:'EMR', red:'RED', ace:'ACE' };

    const RAW_URL = 'https://raw.githubusercontent.com/TFuqua07/tfuqua07.github.io/main/data/achievements.json';
    const gdTierNames = {
        1:'Beginner',2:'Easy',3:'Medium',4:'Hard',5:'Very Hard',
        6:'Insane',7:'Extreme',8:'Remorseless',9:'Relentless',10:'Terrifying',
        11:'Catastrophic',12:'Inexorable',13:'Excruciating',14:'Merciless',15:'Monstrous',
        16:'Apocalyptic',17:'Demonic',18:'Menacing',19:'Unreal',20:'Nightmare'
    };

    let currentData = {};
    let currentTab = 'celeste_goldens';

    // ── Neon White helpers ───────────────────────────────────────────────────
    function timeToMs(str) {
        if (!str) return Infinity;
        const parts = str.split(':');
        const mins = parseInt(parts[0]);
        const secParts = parts[1].split('.');
        return (mins * 60 + parseInt(secParts[0])) * 1000 + parseInt(secParts[1] || 0);
    }

    function getMedalForTime(pb, stageData) {
        if (!pb) return null;
        const pbMs = timeToMs(pb);
        for (const medal of MEDAL_ORDER) {
            if (stageData[medal] && pbMs <= timeToMs(stageData[medal])) return medal;
        }
        return null;
    }

    function getNWSavedData() {
        try { return JSON.parse(localStorage.getItem('nw_times') || '{}'); } catch { return {}; }
    }

    // ── Celeste / GD loading ─────────────────────────────────────────────────
    async function loadAchievements() {
        try {
            const response = await fetch(RAW_URL + '?t=' + Date.now());
            if (!response.ok) throw new Error('HTTP ' + response.status);
            currentData = await response.json();
            renderTab(currentTab);
        } catch (error) {
            document.getElementById('content').innerHTML =
                '<div class="empty-state">Failed to load achievements</div>';
        }
    }

    function switchTab(tab, btn) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        renderTab(tab);
    }

    function renderTab(tab) {
        if (tab === 'neon_white') {
            renderNeonWhite();
        } else {
            renderAchievementsTab(tab);
        }
    }

    // ── Celeste / GD rendering ───────────────────────────────────────────────
    function renderAchievementsTab(category) {
        const container = document.getElementById('content');
        const items = currentData[category] || [];

        if (items.length === 0) {
            container.innerHTML = '<div class="empty-state">No achievements yet</div>';
            return;
        }

        const isClears  = category === 'celeste_clears';
        const isGoldens = category === 'celeste_goldens';
        const isGD      = category === 'demons' || category === 'gd_platformer';

        const grouped = {};
        items.forEach(item => {
            const key = isClears ? `star-${item.star}` : `tier-${item.tier}`;
            if (!grouped[key]) grouped[key] = [];
            grouped[key].push(item);
        });

        Object.keys(grouped).forEach(key => {
            grouped[key].sort((a, b) => a.name.localeCompare(b.name));
        });

        const sortedKeys = Object.keys(grouped).sort((a, b) =>
            parseInt(b.split('-')[1]) - parseInt(a.split('-')[1])
        );

        let html = '<div class="tiers-container">';
        sortedKeys.forEach(key => {
            const group = grouped[key];
            const num = parseInt(key.split('-')[1]);
            let colorClass, label, borderClass;

            if (isClears) {
                colorClass = `star-color-${num}`;
                borderClass = `star-border-${num}`;
                label = `${num}★`;
            } else if (isGoldens) {
                colorClass = `tier-color-${num}`;
                borderClass = `tier-border-${num}`;
                label = `Tier ${num}`;
            } else {
                colorClass = `gd-tier-color-${num}`;
                borderClass = `gd-tier-border-${num}`;
                label = gdTierNames[num] || `Tier ${num}`;
            }

            html += `<div class="tier-column">`;
            html += `<div class="tier-header ${colorClass}"><span>${label}</span><span class="tier-count">${group.length}</span></div>`;
            group.forEach(item => { html += renderCard(item, category, borderClass); });
            html += `</div>`;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    function renderCard(item, category, borderClass) {
        const isClears  = category === 'celeste_clears';
        const isGoldens = category === 'celeste_goldens';
        const isGD      = category === 'demons' || category === 'gd_platformer';
        const ytId = getYouTubeId(item.video);
        const thumbnailUrl = item.thumbnail || (ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : null);
        const hasVideo = !!item.video;

        const thumbContent = thumbnailUrl
            ? `<img src="${escapeHtml(thumbnailUrl)}" alt="" loading="lazy">`
            : `<div class="no-thumb">No Video</div>`;
        const thumbClick = hasVideo ? `onclick="window.open('${escapeHtml(item.video)}','_blank')"` : '';
        const playIcon = hasVideo
            ? `<div class="play-icon"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>` : '';

        let metaHtml = '';
        if ((isGoldens || isClears) && item.time) {
            metaHtml = `<span class="meta-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></span><span class="meta-text">${escapeHtml(item.time)}</span>`;
        } else if (isClears && item.deaths != null) {
            metaHtml = `<span class="meta-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/></svg></span><span class="meta-text">${item.deaths} deaths</span>`;
        } else if (isGD && item.attempts != null) {
            metaHtml = `<span class="meta-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 6 6 1-4 4 1 6-6-3-6 3 1-6-4-4 6-1z"/></svg></span><span class="meta-text">${item.attempts.toLocaleString()} attempts</span>`;
        }

        const ratingHtml = item.rating != null ? `
            <div class="card-rating">
                <span class="rating-heart"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></span>
                <span class="rating-value">${item.rating}</span>
            </div>` : '';

        return `
            <article class="achievement-card ${borderClass}">
                <div class="card-thumb ${hasVideo ? 'has-video' : ''}" ${thumbClick}>
                    ${thumbContent}${playIcon}
                </div>
                <div class="card-body">
                    <div>
                        <div class="card-title">${escapeHtml(item.name)}</div>
                        ${item.campaign ? `<div class="card-campaign">${escapeHtml(item.campaign)}</div>` : ''}
                    </div>
                    <div class="card-bottom">
                        <div class="card-meta">${metaHtml}</div>
                        ${ratingHtml}
                    </div>
                </div>
            </article>`;
    }

    // ── Neon White rendering ─────────────────────────────────────────────────
    function renderNeonWhite() {
        const container = document.getElementById('content');
        container.innerHTML = `
            <div class="nw-container">
                <div class="nw-selectors">
                    <div class="nw-select-group">
                        <label>Mission</label>
                        <select id="nw-mission-sel" onchange="onNWMissionChange()">
                            <option value="">All Missions</option>
                        </select>
                    </div>
                    <div class="nw-select-group">
                        <label>Stage</label>
                        <select id="nw-stage-sel" onchange="renderNWCards()">
                            <option value="">All Stages</option>
                        </select>
                    </div>
                </div>
                <div id="nw-cards" class="nw-grid"></div>
            </div>`;

        const sel = document.getElementById('nw-mission-sel');
        Object.keys(NW_DATA).forEach(m => {
            const o = document.createElement('option');
            o.value = m; o.textContent = m;
            sel.appendChild(o);
        });
        renderNWCards();
    }

    function onNWMissionChange() {
        const mission = document.getElementById('nw-mission-sel').value;
        const stageSel = document.getElementById('nw-stage-sel');
        stageSel.innerHTML = '<option value="">All Stages</option>';
        if (mission && NW_DATA[mission]) {
            NW_DATA[mission].forEach(s => {
                const o = document.createElement('option');
                o.value = s.stage; o.textContent = s.stage;
                stageSel.appendChild(o);
            });
        }
        renderNWCards();
    }

    function renderNWCards() {
        const mission = document.getElementById('nw-mission-sel').value;
        const stageFilter = document.getElementById('nw-stage-sel').value;
        const container = document.getElementById('nw-cards');
        const savedData = getNWSavedData();

        let stages = [];
        if (mission && NW_DATA[mission]) {
            stages = NW_DATA[mission].map(s => ({ ...s, _mission: mission }));
        } else {
            Object.entries(NW_DATA).forEach(([m, arr]) => {
                arr.forEach(s => stages.push({ ...s, _mission: m }));
            });
        }
        if (stageFilter) stages = stages.filter(s => s.stage === stageFilter);

        if (!stages.length) {
            container.innerHTML = '<div class="empty-state">No stages found</div>';
            return;
        }

        container.innerHTML = stages.map(s => {
            const key = `${s._mission}||${s.stage}`;
            const saved = savedData[key] || {};
            const pb = saved.pb || null;
            const video = saved.video || null;
            const medal = getMedalForTime(pb, s);

            const medalBadge = medal
                ? `<span class="medal-badge medal-${medal}">${MEDAL_LABELS[medal]}</span>`
                : `<span class="medal-badge medal-none">—</span>`;

            const timeCells = MEDAL_ORDER.map(m => {
                const isAchieved = medal && MEDAL_ORDER.indexOf(m) >= MEDAL_ORDER.indexOf(medal);
                const cls = isAchieved ? `time-cell tc-${m} active-medal` : `time-cell tc-${m} unachieved`;
                return `<div class="${cls}">
                    <span class="time-cell-label">${MEDAL_LABELS[m]}</span>
                    <span class="time-cell-val">${s[m] || '—'}</span>
                </div>`;
            }).join('');

            const pbDisplay = pb
                ? `<span class="pb-value" style="color:${getNWMedalColor(medal)}">${pb}</span>`
                : `<span class="pb-none">No time yet</span>`;

            const videoBtn = video
                ? `<a href="${escapeHtml(video)}" class="pb-video-link" target="_blank">
                     <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>VOD
                   </a>` : '';

            return `<div class="nw-stage-card">
                <div class="stage-header">
                    <div>
                        <div class="stage-name">${escapeHtml(s.stage)}</div>
                        <div class="stage-mission">${escapeHtml(s._mission)}</div>
                    </div>
                    ${medalBadge}
                </div>
                <div class="stage-body">
                    <div class="time-row">${timeCells}</div>
                    <div class="stage-pb-row">
                        <span class="pb-label">Personal Best</span>
                        <div style="display:flex;align-items:center;gap:0.5rem">${videoBtn}${pbDisplay}</div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function getNWMedalColor(medal) {
        const colors = { diamond:'#7fffff', topaz:'#ffb300', sapphire:'#40c4ff', amethyst:'#ce93ff', emerald:'#00e676', red:'#ff5252', ace:'#ffe040' };
        return colors[medal] || 'var(--text-secondary)';
    }

    function getYouTubeId(url) {
        if (!url) return null;
        const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
        return match ? match[1] : null;
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    loadAchievements();
    </script>
