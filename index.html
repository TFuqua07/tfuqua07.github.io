<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula's Achievements</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-card: #1e1e2e;
            --text-primary: #f0f0f5;
            --text-secondary: #9090a0;
            --text-muted: #606070;
            --border: #2a2a3a;
            --accent: #6366f1;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
        }

        h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }

        .tab-nav {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tab-nav::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 1rem 1.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.15s;
            white-space: nowrap;
            font-family: inherit;
        }
        .tab-btn:hover { color: var(--text-primary); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .tier-section { margin-bottom: 2rem; }

        .tier-header {
            padding: 0.875rem 1.5rem;
            font-weight: 600;
            font-size: 0.9375rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 2rem 2rem 0;
            border-radius: 8px 8px 0 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tier-count {
            background: rgba(0,0,0,0.3);
            padding: 0.25rem 0.625rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            padding: 1rem 2rem 2rem;
        }

        .achievement-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .achievement-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .card-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--bg-tertiary);
            position: relative;
            overflow: hidden;
        }
        .card-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .card-thumbnail .no-thumb {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 0.875rem;
        }

        .card-content { padding: 1.25rem; }
        .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.375rem; color: var(--text-primary); line-height: 1.4; }
        .card-campaign { color: var(--text-secondary); font-size: 0.8125rem; margin-bottom: 1rem; font-weight: 500; }

        .card-stats { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; }

        .stat {
            display: flex; align-items: center; gap: 0.375rem;
            font-size: 0.8125rem; color: var(--text-secondary);
            background: var(--bg-tertiary); padding: 0.375rem 0.625rem;
            border-radius: 6px; font-weight: 500;
        }
        .stat svg { width: 14px; height: 14px; }

        .video-link {
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--accent); text-decoration: none;
            font-size: 0.8125rem; font-weight: 500;
            padding: 0.5rem 0; transition: opacity 0.15s;
        }
        .video-link:hover { opacity: 0.8; }

        /* Star tiers */
        .star-10 { background: linear-gradient(90deg, #1a0a2e, #2d1b4e); color: #b8a9d9; }
        .star-9  { background: linear-gradient(90deg, #0f172a, #1e3a5f); color: #60a5fa; }
        .star-8  { background: linear-gradient(90deg, #0a1f1f, #134e4e); color: #2dd4bf; }
        .star-7  { background: linear-gradient(90deg, #0a1f0a, #134e13); color: #4ade80; }
        .star-6  { background: linear-gradient(90deg, #0a1f0a, #134e13); color: #4ade80; }
        .star-5  { background: linear-gradient(90deg, #1f1f0a, #4e4e13); color: #facc15; }
        .star-4  { background: linear-gradient(90deg, #1f0f0a, #4e1f13); color: #fb923c; }
        .star-3  { background: linear-gradient(90deg, #1f0a0a, #4e1313); color: #f87171; }
        .star-2  { background: linear-gradient(90deg, #1f0a1f, #4e134e); color: #e879f9; }
        .star-1  { background: linear-gradient(90deg, #1a1a1a, #2a2a2a); color: #a0a0b0; }

        /* Tier tiers */
        .tier-22, .tier-21, .tier-20 { background: linear-gradient(90deg, #1a0a2e, #2d1b4e); color: #b8a9d9; }
        .tier-19, .tier-18, .tier-17 { background: linear-gradient(90deg, #0f172a, #1e3a5f); color: #60a5fa; }
        .tier-16, .tier-15, .tier-14 { background: linear-gradient(90deg, #1f0a0a, #4e1313); color: #f87171; }
        .tier-13, .tier-12, .tier-11 { background: linear-gradient(90deg, #1f0f0a, #4e1f13); color: #fb923c; }
        .tier-10, .tier-9, .tier-8   { background: linear-gradient(90deg, #1f1f0a, #4e4e13); color: #facc15; }
        .tier-7, .tier-6, .tier-5    { background: linear-gradient(90deg, #0a1f0a, #134e13); color: #4ade80; }
        .tier-4, .tier-3, .tier-2, .tier-1 { background: linear-gradient(90deg, #1a1a1a, #2a2a2a); color: #a0a0b0; }

        .empty-state {
            text-align: center; padding: 4rem 2rem;
            color: var(--text-muted); font-size: 0.9375rem;
        }

        @media (max-width: 640px) {
            .cards-grid { padding: 0.75rem 1rem 1.5rem; grid-template-columns: 1fr; }
            .tier-header { margin: 1rem 1rem 0; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Nebula's Achievements</h1>
    </header>

    <nav class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('celeste_goldens')">Celeste Goldens</button>
        <button class="tab-btn" onclick="switchTab('celeste_clears')">Celeste Clears</button>
        <button class="tab-btn" onclick="switchTab('demons')">Demons</button>
        <button class="tab-btn" onclick="switchTab('gd_platformer')">GD Platformers</button>
    </nav>

    <main id="content"></main>

    <script>
        // Fetches directly from your GitHub repo — no backend needed
        const RAW_URL = 'https://raw.githubusercontent.com/TFuqua07/tfuqua07.github.io/main/data/achievements.json';

        let currentData = {};
        let currentTab = 'celeste_goldens';

        const tierNames = {
            1: 'Beginner', 2: 'Easy', 3: 'Medium', 4: 'Hard', 5: 'Very Hard',
            6: 'Insane', 7: 'Extreme', 8: 'Remorseless', 9: 'Relentless',
            10: 'Terrifying', 11: 'Catastrophic', 12: 'Merciless',
            13: 'Excruciating', 14: 'Monstrous', 15: 'Apocalyptic',
            16: 'Demonic', 17: 'Menacing', 18: 'Unreal', 19: 'Nightmare',
            20: 'Extreme Demon', 21: 'Easy Demon', 22: 'Medium Demon'
        };

        async function loadAchievements() {
            try {
                const response = await fetch(RAW_URL + '?t=' + Date.now());
                currentData = await response.json();
                renderTab(currentTab);
            } catch (error) {
                document.getElementById('content').innerHTML =
                    '<div class="empty-state">Failed to load achievements</div>';
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase().includes(
                    tab === 'gd_platformer' ? 'platformer' : tab.replace('_', ' ')
                )) btn.classList.add('active');
            });
            renderTab(tab);
        }

        function getYouTubeThumbnail(url) {
            if (!url) return null;
            const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
            return match ? `https://img.youtube.com/vi/${match[1]}/hqdefault.jpg` : null;
        }

        function formatTime(timeStr) {
            if (!timeStr) return null;
            const parts = timeStr.split(':');
            if (parts.length === 3) return `${parseInt(parts[0])}:${parts[1]}:${parts[2]}`;
            return timeStr;
        }

        function renderTab(category) {
            const container = document.getElementById('content');
            const items = currentData[category] || [];

            if (items.length === 0) {
                container.innerHTML = '<div class="empty-state">No achievements yet</div>';
                return;
            }

            const grouped = {};
            items.forEach(item => {
                const key = item.tier !== undefined ? `tier-${item.tier}` : `star-${item.star}`;
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(item);
            });

            const sortedKeys = Object.keys(grouped).sort((a, b) =>
                parseInt(b.split('-')[1]) - parseInt(a.split('-')[1])
            );

            let html = '';
            sortedKeys.forEach(key => {
                const group = grouped[key];
                const isTier = key.startsWith('tier');
                const num = key.split('-')[1];
                const cssClass = isTier ? `tier-${num}` : `star-${num}`;
                const label = isTier ? (tierNames[num] || `Tier ${num}`) : `${num} Star`;

                html += `
                    <div class="tier-section">
                        <div class="tier-header ${cssClass}">
                            ${label}
                            <span class="tier-count">${group.length}</span>
                        </div>
                        <div class="cards-grid">
                            ${group.map(item => renderCard(item, category)).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderCard(item, category) {
            const isClear = category === 'celeste_clears';
            let statsHtml = '';

            if (isClear) {
                if (item.deaths !== undefined && item.deaths !== null) {
                    statsHtml += `<div class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>${item.deaths} deaths</div>`;
                }
                const t = formatTime(item.time);
                if (t) statsHtml += `<div class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${t}</div>`;
            } else if (category === 'celeste_goldens') {
                const t = formatTime(item.time);
                if (t) statsHtml += `<div class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${t}</div>`;
            } else {
                if (item.attempts !== undefined && item.attempts !== null) {
                    statsHtml += `<div class="stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 6 6 1-4 4 1 6-6-3-6 3 1-6-4-4 6-1z"/></svg>${item.attempts.toLocaleString()} attempts</div>`;
                }
            }

            const thumbnailUrl = item.thumbnail || getYouTubeThumbnail(item.video);
            const thumbnailHtml = thumbnailUrl
                ? `<img src="${escapeHtml(thumbnailUrl)}" alt="" loading="lazy">`
                : '<div class="no-thumb">No Thumbnail</div>';

            return `
                <article class="achievement-card">
                    <div class="card-thumbnail">${thumbnailHtml}</div>
                    <div class="card-content">
                        <h3 class="card-title">${escapeHtml(item.name)}</h3>
                        ${item.campaign ? `<div class="card-campaign">${escapeHtml(item.campaign)}</div>` : ''}
                        <div class="card-stats">${statsHtml}</div>
                        ${item.video ? `
                            <a href="${escapeHtml(item.video)}" target="_blank" class="video-link">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                Watch Video
                            </a>
                        ` : ''}
                    </div>
                </article>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadAchievements();
    </script>
</body>
</html>
